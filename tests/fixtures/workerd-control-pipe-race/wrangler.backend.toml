name = "workerd-control-pipe-race-backend"
main = "src/backend.ts"
compatibility_date = "2025-08-15"
compatibility_flags = ["nodejs_compat"]

[[services]]
binding = "OTHER"
service = "workerd-control-pipe-race-other"

[[d1_databases]]
binding = "DB"
database_name = "workerd-control-pipe-race-db"
database_id = "workerd-control-pipe-race-db"

[[kv_namespaces]]
binding = "KV"
id = "workerd-control-pipe-race-kv"

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "workerd-control-pipe-race-documents"
